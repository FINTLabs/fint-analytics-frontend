apiVersion: fintlabs.no/v1alpha1
kind: Application
metadata:
  name: fint-analytics-frontend
  namespace: fintlabs-no
spec:
  port: 3000
  orgId: fintlabs.no
  image: ghcr.io/fintlabs/fint-analytics-frontend
  imagePullPolicy: Always
  database:
    enabled: true
    database: fint-core
  env:
    - name: ANALYTICS_TOKEN
      value: change-me
#  url:
#    hostname: kunde-beta.felleskomponent.no
#    basePath: /
  ingress:
    enabled: true